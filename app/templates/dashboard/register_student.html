{% extends "base.html" %}

{% block title %}Register Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h4 class="fw-bold mb-4"><i class="bi bi-person-plus me-2"></i>Register New Student</h4>
            
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Student Name *</label>
                        <input type="text" name="student_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Roll Number *</label>
                        <input type="text" name="roll_no" class="form-control" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Class *</label>
                    <select name="class_id" class="form-select" required>
                        <option value="">Select Class</option>
                        {% for class in classes %}
                        <option value="{{ class.id }}">{{ class.display_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Parent Name</label>
                        <input type="text" name="parent_name" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Parent Phone</label>
                        <input type="tel" name="parent_phone" class="form-control">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Parent Email</label>
                    <input type="email" name="parent_email" class="form-control">
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Register Student
                    </button>
                    <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
