{% extends "base.html" %}
{% block title %}Register Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">Register New Student</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('dashboard.register_student') }}">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Student Name *</label>
                            <input type="text" name="name" class="form-control" required placeholder="Enter student name">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Roll Number *</label>
                            <input type="text" name="roll_number" class="form-control" required placeholder="Enter roll number">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Class *</label>
                        <!-- ✅ Dropdown with dark text -->
                        <select name="class_id" class="form-select" style="color: #333; background: #fff;" required>
                            <option value="" style="color: #333;">Select Class</option>
                            {% if classes %}
                                {% for class in classes %}
                                <option value="{{ class.id }}" style="color: #333;">
                                    {{ class.name }} {% if class.subject %}({{ class.subject }}){% endif %}
                                </option>
                                {% endfor %}
                            {% else %}
                                <option value="" disabled style="color: #333;">No classes available - Create class first!</option>
                            {% endif %}
                        </select>
                        {% if not classes %}
                        <small class="text-danger">
                            <a href="{{ url_for('dashboard.create_class') }}">Create a class first</a>
                        </small>
                        {% endif %}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Optional email">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Register Student</button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
