{% extends "base.html" %}

{% block title %}Create Class{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="fw-bold mb-4"><i class="bi bi-plus-circle me-2"></i>Create New Class</h4>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Class Name</label>
                    <input type="text" name="class_name" class="form-control" 
                           placeholder="e.g., Class 10, BCA 2nd Year" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-control" 
                           placeholder="e.g., Mathematics, Computer Science" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Section</label>
                        <input type="text" name="section" class="form-control" placeholder="A" value="A">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Academic Year</label>
                        <input type="text" name="academic_year" class="form-control" placeholder="2024-25" value="2024-25">
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Create Class
                    </button>
                    <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
