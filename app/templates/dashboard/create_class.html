{% extends "base.html" %}
{% block title %}Create Class{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">Create New Class</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('dashboard.create_class') }}">
                    
                    <!-- ✅ type="number" aur min/max -->
                    <div class="mb-3">
                        <label class="form-label">Class Number (1-12 only)</label>
                        <input type="number" name="name" class="form-control" 
                               min="1" max="12" step="1" 
                               placeholder="Enter 1, 2, 3... 12" required>
                        <small class="text-muted">Only numbers 1 to 12 allowed</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" name="subject" class="form-control" placeholder="e.g., Mathematics">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Section</label>
                        <input type="text" name="section" class="form-control" placeholder="A">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Academic Year</label>
                        <input type="text" name="academic_year" class="form-control" placeholder="2024-25">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Create Class</button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
